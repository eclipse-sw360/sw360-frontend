name: Commit Checks

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**.md'

permissions:
  contents: read

jobs:
  validate:
    name: Validate Pull Request Commits
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: webiny/action-conventional-commits@7f91b1595ca1951cdb671ddc9f07a49081ec5b69 # v1.4.2
      - uses: apache/skywalking-eyes/header@61275cc80d0798a405cb070f7d3a8aaf7cf2c2c1 # main

      - name: Check deny listed files
        run: bash .github/deny_list.sh
